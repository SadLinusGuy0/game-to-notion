name: Xbox to Notion Sync

on:
  schedule:
    - cron: '0 13 * * *'
  workflow_dispatch:

jobs:
  sync:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3

      - uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install requests beautifulsoup4

      - name: Run Xbox sync
        run: python xbox_to_notion.py
        env:
          OPENXBL_API_KEY:        ${{ secrets.OPENXBL_API_KEY }}
          NOTION_API_KEY:         ${{ secrets.NOTION_API_KEY }}
          NOTION_DATABASE_ID_XBOX: ${{ secrets.NOTION_DATABASE_ID_XBOX }}
          STEAMGRIDDB_API_KEY:    ${{ secrets.STEAMGRIDDB_API_KEY }}

